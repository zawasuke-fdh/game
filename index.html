<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Invaders</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #0f0;
    overflow: hidden;
    touch-action: none;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 480px;
    padding: 6px 10px;
    font-size: 14px;
    letter-spacing: 1px;
  }
  canvas {
    display: block;
    background: #000;
    border: 1px solid #1a1a1a;
  }
  #controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 480px;
    padding: 8px 10px;
    gap: 8px;
  }
  .btn-group {
    display: flex;
    gap: 8px;
  }
  .ctrl-btn {
    background: #111;
    border: 2px solid #0f0;
    color: #0f0;
    font-size: 22px;
    width: 64px;
    height: 64px;
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active, .ctrl-btn.pressed {
    background: #0f0;
    color: #000;
  }
  #fire-btn {
    background: #111;
    border: 2px solid #f00;
    color: #f00;
    font-size: 14px;
    width: 72px;
    height: 64px;
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  #fire-btn:active, #fire-btn.pressed {
    background: #f00;
    color: #000;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    gap: 16px;
  }
  #overlay h1 {
    font-size: 32px;
    color: #0f0;
    letter-spacing: 4px;
    text-shadow: 0 0 16px #0f0;
  }
  #overlay p {
    font-size: 14px;
    color: #aaa;
    text-align: center;
    padding: 0 20px;
  }
  #overlay .score-display {
    font-size: 20px;
    color: #ff0;
  }
  #difficulty-btns {
    display: flex;
    gap: 10px;
  }
  .diff-btn {
    background: #111;
    color: #0f0;
    border: 2px solid #0f0;
    padding: 8px 18px;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.1s;
  }
  .diff-btn.selected {
    background: #0f0;
    color: #000;
  }
  #start-btn {
    background: #0f0;
    color: #000;
    border: none;
    padding: 14px 40px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
  }
  #start-btn:active { opacity: 0.8; }
</style>
</head>
<body>

<div id="hud">
  <span>SCORE: <span id="score-val">0</span></span>
  <span>LIVES: <span id="lives-val">3</span></span>
  <span>HI: <span id="hi-val">0</span></span>
</div>
<canvas id="c"></canvas>
<div id="controls">
  <div class="btn-group">
    <button class="ctrl-btn" id="btn-left">&#9664;</button>
    <button class="ctrl-btn" id="btn-right">&#9654;</button>
  </div>
  <button id="fire-btn">FIRE</button>
</div>

<div id="overlay">
  <h1>SPACE<br>INVADERS</h1>
  <p id="overlay-msg">キーボード: &#8592;&#8594; 移動 / スペース 射撃<br>スマホ: 画面下のボタンで操作</p>
  <div class="score-display" id="final-score" style="display:none"></div>
  <div id="difficulty-btns">
    <button class="diff-btn selected" data-diff="easy">EASY</button>
    <button class="diff-btn" data-diff="normal">NORMAL</button>
    <button class="diff-btn" data-diff="hard">HARD</button>
  </div>
  <button id="start-btn">START</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Responsive sizing ---
function resize() {
  const maxW = Math.min(window.innerWidth, 480);
  const hud = document.getElementById('hud');
  const ctrl = document.getElementById('controls');
  const hudH = hud.offsetHeight;
  const ctrlH = ctrl.offsetHeight;
  const availH = window.innerHeight - hudH - ctrlH - 4;
  canvas.width = maxW;
  canvas.height = Math.max(availH, 300);
}
resize();
window.addEventListener('resize', () => { resize(); initGame(); });

// --- Constants ---
const ROWS = 5, COLS = 10;
const INVADER_W = 32, INVADER_H = 24;
const PLAYER_W = 40, PLAYER_H = 20;
const BULLET_W = 3, BULLET_H = 10;
const BOMB_W = 4, BOMB_H = 10;
const BARRIER_W = 48, BARRIER_H = 28;
const BARRIER_COUNT = 4;

// --- State ---
let state = 'idle';
let score = 0, hiScore = 0, lives = 3;
let difficulty = 'easy';
const DIFF = {
  easy:   { stepBase: 1200, stepMin: 300, levelInc: 50,  bombMax: 2, bombChance: 0.2, playerSpeed: 4.0, fireCool: 280, bombSpeed: 3 },
  normal: { stepBase: 900,  stepMin: 180, levelInc: 70,  bombMax: 3, bombChance: 0.3, playerSpeed: 3.5, fireCool: 350, bombSpeed: 4 },
  hard:   { stepBase: 650,  stepMin: 100, levelInc: 100, bombMax: 5, bombChance: 0.45, playerSpeed: 3.5, fireCool: 350, bombSpeed: 5 },
};
let player, bullets = [], bombs = [], invaders = [], barriers = [], particles = [];
let invDirX, invSpeed, invDropAmt, invStepTimer, invStepInterval;
let ufo, ufoTimer, ufoInterval;
let level = 1;
let gameLoop;

const keys = { left: false, right: false, fire: false };
let fireCooldown = 0;
let firePressed = false;

// --- Init ---
function initGame() {
  score = 0;
  lives = 3;
  level = 1;
  particles = [];
  setupLevel();
  updateHUD();
}

function setupLevel() {
  const W = canvas.width, H = canvas.height;

  player = { x: W / 2 - PLAYER_W / 2, y: H - PLAYER_H - 16, w: PLAYER_W, h: PLAYER_H };
  bullets = [];
  bombs = [];
  particles = [];
  ufo = null;
  ufoTimer = 0;
  ufoInterval = 600 + Math.random() * 400;

  // Invaders
  const startX = (W - COLS * (INVADER_W + 8)) / 2;
  const startY = 50;
  invaders = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      invaders.push({
        x: startX + c * (INVADER_W + 8),
        y: startY + r * (INVADER_H + 10),
        w: INVADER_W, h: INVADER_H,
        row: r, col: c, alive: true, frame: 0
      });
    }
  }
  invDirX = 1;
  const d = DIFF[difficulty];
  invSpeed = 1;
  invDropAmt = 18;
  invStepInterval = Math.max(d.stepBase - (level - 1) * d.levelInc, d.stepMin);
  invStepTimer = 0;

  // Barriers
  barriers = [];
  const bSpacing = W / (BARRIER_COUNT + 1);
  for (let i = 0; i < BARRIER_COUNT; i++) {
    const bx = bSpacing * (i + 1) - BARRIER_W / 2;
    const by = H - PLAYER_H - 70;
    // Pixel grid for damage
    const pixels = [];
    for (let py = 0; py < BARRIER_H; py++) {
      pixels[py] = [];
      for (let px = 0; px < BARRIER_W; px++) {
        // Arch shape
        const cx = BARRIER_W / 2, topY = 6;
        const dist = Math.sqrt((px - cx) ** 2 + (py - topY) ** 2);
        const inArch = py > BARRIER_H * 0.5 && px > BARRIER_W * 0.25 && px < BARRIER_W * 0.75 && py < BARRIER_H;
        pixels[py][px] = dist < BARRIER_W * 0.55 && !inArch ? 1 : 0;
      }
    }
    barriers.push({ x: bx, y: by, w: BARRIER_W, h: BARRIER_H, pixels });
  }
}

// --- HUD ---
function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('lives-val').textContent = lives;
  document.getElementById('hi-val').textContent = hiScore;
}

// --- Drawing ---
function drawPlayer() {
  const p = player;
  ctx.fillStyle = '#0f0';
  // Body
  ctx.fillRect(p.x + 8, p.y + 8, p.w - 16, p.h - 8);
  // Cannon
  ctx.fillRect(p.x + p.w / 2 - 3, p.y, 6, 12);
  // Wings
  ctx.fillRect(p.x, p.y + 12, 10, 8);
  ctx.fillRect(p.x + p.w - 10, p.y + 12, 10, 8);
}

const INV_SHAPES = [
  // row 0: crab top
  (x,y,w,h,f) => {
    ctx.fillRect(x+6,y,w-12,4);
    ctx.fillRect(x+2,y+4,w-4,8);
    ctx.fillRect(x,y+8,w,4);
    ctx.fillRect(x+2,y+12,w-4,4);
    if(f===0){ctx.fillRect(x,y+16,6,4);ctx.fillRect(x+w-6,y+16,6,4);}
    else{ctx.fillRect(x+4,y+16,6,4);ctx.fillRect(x+w-10,y+16,6,4);}
  },
  // row 1-2: squid
  (x,y,w,h,f) => {
    ctx.fillRect(x+4,y,w-8,4);
    ctx.fillRect(x,y+4,w,8);
    ctx.fillRect(x+4,y+12,4,4);
    ctx.fillRect(x+w-8,y+12,4,4);
    if(f===0){ctx.fillRect(x,y+16,6,4);ctx.fillRect(x+w-6,y+16,6,4);}
    else{ctx.fillRect(x+2,y+16,6,4);ctx.fillRect(x+w-8,y+16,6,4);}
  },
  // row 3-4: octopus
  (x,y,w,h,f) => {
    ctx.fillRect(x+8,y,w-16,4);
    ctx.fillRect(x+4,y+4,w-8,8);
    ctx.fillRect(x,y+8,w,8);
    ctx.fillRect(x+4,y+16,4,4);
    ctx.fillRect(x+w-8,y+16,4,4);
    if(f===0){ctx.fillRect(x,y+16,4,4);ctx.fillRect(x+w-4,y+16,4,4);}
    else{ctx.fillRect(x+2,y+16,4,4);ctx.fillRect(x+w-6,y+16,4,4);}
  }
];

const INV_COLORS = ['#f0f','#0ff','#0ff','#ff0','#ff0'];

function drawInvaders() {
  for (const inv of invaders) {
    if (!inv.alive) continue;
    ctx.fillStyle = INV_COLORS[inv.row] || '#fff';
    const shapeIdx = inv.row === 0 ? 0 : inv.row <= 2 ? 1 : 2;
    INV_SHAPES[shapeIdx](inv.x, inv.y, inv.w, inv.h, inv.frame);
  }
}

function drawUFO() {
  if (!ufo) return;
  ctx.fillStyle = '#f00';
  ctx.fillRect(ufo.x + 8, ufo.y, ufo.w - 16, 8);
  ctx.fillRect(ufo.x, ufo.y + 8, ufo.w, 8);
  ctx.fillRect(ufo.x + 4, ufo.y + 4, 4, 4);
  ctx.fillRect(ufo.x + ufo.w - 8, ufo.y + 4, 4, 4);
  ctx.fillRect(ufo.x + ufo.w/2 - 2, ufo.y + 2, 4, 4);
}

function drawBullets() {
  ctx.fillStyle = '#ff0';
  for (const b of bullets) ctx.fillRect(b.x, b.y, BULLET_W, BULLET_H);
}

function drawBombs() {
  for (const b of bombs) {
    ctx.fillStyle = b.frame % 2 === 0 ? '#f80' : '#f00';
    ctx.fillRect(b.x, b.y, BOMB_W, BOMB_H);
  }
}

function drawBarriers() {
  for (const bar of barriers) {
    ctx.fillStyle = '#0f0';
    for (let py = 0; py < bar.h; py++) {
      for (let px = 0; px < bar.w; px++) {
        if (bar.pixels[py] && bar.pixels[py][px]) {
          ctx.fillRect(bar.x + px, bar.y + py, 1, 1);
        }
      }
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawGroundLine() {
  ctx.strokeStyle = '#0f0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height - 10);
  ctx.lineTo(canvas.width, canvas.height - 10);
  ctx.stroke();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGroundLine();
  drawBarriers();
  drawInvaders();
  drawUFO();
  drawPlayer();
  drawBullets();
  drawBombs();
  drawParticles();
}

// --- Particles ---
function explode(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 30, maxLife: 30,
      size: Math.random() * 3 + 1,
      color
    });
  }
}

// --- Update ---
let lastTime = 0;
function update(ts) {
  if (state !== 'playing') return;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  // Player movement
  const speed = DIFF[difficulty].playerSpeed;
  if (keys.left) player.x = Math.max(0, player.x - speed);
  if (keys.right) player.x = Math.min(canvas.width - player.w, player.x + speed);

  // Fire
  fireCooldown = Math.max(0, fireCooldown - dt);
  if (keys.fire && fireCooldown === 0) {
    bullets.push({ x: player.x + player.w / 2 - BULLET_W / 2, y: player.y });
    fireCooldown = DIFF[difficulty].fireCool;
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= 8;
    if (bullets[i].y < 0) { bullets.splice(i, 1); continue; }
    // vs invaders
    let hit = false;
    for (const inv of invaders) {
      if (!inv.alive) continue;
      if (rectsOverlap(bullets[i], {x:inv.x,y:inv.y,w:inv.w,h:inv.h})) {
        inv.alive = false;
        const pts = [30,20,20,10,10][inv.row] || 10;
        score += pts * level;
        hiScore = Math.max(hiScore, score);
        explode(inv.x + inv.w/2, inv.y + inv.h/2, INV_COLORS[inv.row]);
        bullets.splice(i, 1);
        hit = true;
        updateHUD();
        break;
      }
    }
    if (hit) continue;
    // vs ufo
    if (ufo && rectsOverlap(bullets[i], ufo)) {
      score += 100 * level;
      hiScore = Math.max(hiScore, score);
      explode(ufo.x + ufo.w/2, ufo.y + ufo.h/2, '#f00', 12);
      ufo = null;
      bullets.splice(i, 1);
      updateHUD();
      continue;
    }
    // vs barriers
    damageBarrier(bullets[i], true);
    if (i < bullets.length && bullets[i] && bullets[i].y < 0) bullets.splice(i, 1);
  }

  // Invader step
  invStepTimer += dt;
  if (invStepTimer >= invStepInterval) {
    invStepTimer = 0;
    stepInvaders();
  }

  // Bombs
  for (let i = bombs.length - 1; i >= 0; i--) {
    bombs[i].y += DIFF[difficulty].bombSpeed;
    bombs[i].frame++;
    if (bombs[i].y > canvas.height) { bombs.splice(i, 1); continue; }
    // vs player
    if (rectsOverlap(bombs[i], player)) {
      explode(player.x + player.w/2, player.y + player.h/2, '#0f0', 12);
      bombs.splice(i, 1);
      lives--;
      updateHUD();
      if (lives <= 0) { gameOver(); return; }
      // Reset player
      player.x = canvas.width / 2 - PLAYER_W / 2;
      continue;
    }
    // vs barriers
    damageBarrier(bombs[i], false);
  }

  // UFO
  ufoTimer += dt;
  if (ufoTimer >= ufoInterval && !ufo) {
    ufoTimer = 0;
    ufoInterval = 600 + Math.random() * 400;
    ufo = { x: -60, y: 24, w: 52, h: 16, dir: 1 };
    if (Math.random() < 0.5) { ufo.x = canvas.width + 60; ufo.dir = -1; }
  }
  if (ufo) {
    ufo.x += ufo.dir * 2.5;
    if (ufo.x > canvas.width + 80 || ufo.x < -80) ufo = null;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Check win
  if (invaders.every(inv => !inv.alive)) {
    level++;
    setupLevel();
  }

  // Check invaders reached bottom
  const alive = invaders.filter(inv => inv.alive);
  if (alive.length > 0) {
    const maxY = Math.max(...alive.map(inv => inv.y + inv.h));
    if (maxY >= player.y) { gameOver(); return; }
  }
}

function stepInvaders() {
  const alive = invaders.filter(inv => inv.alive);
  if (alive.length === 0) return;

  // Animate frames
  for (const inv of invaders) inv.frame = inv.frame === 0 ? 1 : 0;

  // Move
  let hitWall = false;
  for (const inv of invaders) {
    if (!inv.alive) continue;
    inv.x += invDirX * (INVADER_W / 2 + 2);
    if (inv.x <= 0 || inv.x + inv.w >= canvas.width) hitWall = true;
  }
  if (hitWall) {
    invDirX *= -1;
    for (const inv of invaders) {
      if (!inv.alive) continue;
      inv.x += invDirX * (INVADER_W / 2 + 2) * 2;
      inv.y += invDropAmt;
    }
  }

  // Speed up as fewer invaders remain
  const d = DIFF[difficulty];
  const ratio = alive.length / (ROWS * COLS);
  invStepInterval = Math.max(d.stepMin, (d.stepBase - (level - 1) * d.levelInc) * ratio);

  // Random bomb drop
  if (alive.length > 0 && Math.random() < d.bombChance) {
    // Pick random bottom-most in each column
    const cols = {};
    for (const inv of alive) {
      if (!cols[inv.col] || inv.y > cols[inv.col].y) cols[inv.col] = inv;
    }
    const shooters = Object.values(cols);
    const shooter = shooters[Math.floor(Math.random() * shooters.length)];
    if (bombs.length < d.bombMax) {
      bombs.push({ x: shooter.x + shooter.w/2 - BOMB_W/2, y: shooter.y + shooter.h, frame: 0 });
    }
  }
}

function damageBarrier(proj, isUp) {
  for (const bar of barriers) {
    if (proj.x + BULLET_W < bar.x || proj.x > bar.x + bar.w) continue;
    if (proj.y + (isUp ? BULLET_H : BOMB_H) < bar.y || proj.y > bar.y + bar.h) continue;
    // Pixel-level damage
    const localX = Math.floor(proj.x - bar.x);
    const localY = Math.floor(proj.y - bar.y);
    let hit = false;
    for (let dy = -2; dy <= 5; dy++) {
      for (let dx = -2; dx <= 5; dx++) {
        const px = localX + dx, py = localY + dy;
        if (py >= 0 && py < bar.h && px >= 0 && px < bar.w) {
          if (bar.pixels[py] && bar.pixels[py][px]) {
            bar.pixels[py][px] = 0;
            hit = true;
          }
        }
      }
    }
    if (hit && isUp) {
      // remove bullet
      const idx = bullets.indexOf(proj);
      if (idx !== -1) bullets.splice(idx, 1);
    }
  }
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + (a.w || BULLET_W) > b.x &&
         a.y < b.y + b.h && a.y + (a.h || BULLET_H) > b.y;
}

// --- Game Over / Win ---
function gameOver() {
  state = 'idle';
  const overlay = document.getElementById('overlay');
  const finalScore = document.getElementById('final-score');
  const msg = document.getElementById('overlay-msg');
  document.querySelector('#overlay h1').textContent = 'GAME\nOVER';
  msg.textContent = 'キーボード: ← → 移動 / スペース 射撃\nスマホ: 画面下のボタンで操作';
  finalScore.style.display = 'block';
  finalScore.textContent = 'SCORE: ' + score + (score === hiScore && score > 0 ? '  NEW HI!' : '');
  overlay.style.display = 'flex';
}

// --- Main loop ---
function loop(ts) {
  update(ts);
  render();
  requestAnimationFrame(loop);
}

// --- Controls ---
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') keys.left = true;
  if (e.key === 'ArrowRight') keys.right = true;
  if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); keys.fire = true; }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft') keys.left = false;
  if (e.key === 'ArrowRight') keys.right = false;
  if (e.key === ' ' || e.key === 'ArrowUp') keys.fire = false;
});

function setupTouchBtn(id, key) {
  const btn = document.getElementById(id);
  const start = (e) => { e.preventDefault(); keys[key] = true; btn.classList.add('pressed'); };
  const end = (e) => { e.preventDefault(); keys[key] = false; btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart', start, { passive: false });
  btn.addEventListener('touchend', end, { passive: false });
  btn.addEventListener('touchcancel', end, { passive: false });
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', end);
  btn.addEventListener('mouseleave', end);
}
setupTouchBtn('btn-left', 'left');
setupTouchBtn('btn-right', 'right');
setupTouchBtn('fire-btn', 'fire');

// Start button
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    difficulty = btn.dataset.diff;
  });
});

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  initGame();
  state = 'playing';
  lastTime = performance.now();
});

// --- Boot ---
requestAnimationFrame(loop);
</script>
</body>
</html>
